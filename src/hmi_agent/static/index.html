<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HMI Test Agent 控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="hero fade-in">
      <p class="hero-badge">AUTOMOTIVE QA WORKBENCH</p>
      <h1>HMI Test Agent 控制台</h1>
      <p class="hero-subtitle">
        一键发起需求测试，自动生成Case、执行流程并查看报告。先用离线模式体验，再切换真实QWen。
      </p>
    </header>

    <main class="layout">
      <section class="panel stagger" style="--d: 80ms">
        <h2>1) 发起运行</h2>
        <label for="requirement">需求文本</label>
        <textarea id="requirement" rows="10"></textarea>

        <div class="grid-2">
          <div>
            <label for="configFile">配置文件</label>
            <input id="configFile" value="configs/AI_Config.md" />
          </div>
          <div>
            <label for="outputRoot">输出目录</label>
            <input id="outputRoot" value="runs" />
          </div>
        </div>

        <label class="switch-row" for="offlineDemo">
          <input id="offlineDemo" type="checkbox" checked />
          <span>离线演示模式（推荐新手先开）</span>
        </label>

        <div class="actions">
          <button id="runBtn" class="btn-primary">开始运行</button>
          <button id="refreshBtn" class="btn-secondary">刷新历史</button>
        </div>

        <pre id="status" class="status">等待操作...</pre>
      </section>

      <section class="panel stagger" style="--d: 160ms">
        <h2>2) 历史运行</h2>
        <div id="runList" class="run-list"></div>
      </section>

      <section class="panel panel-wide stagger" style="--d: 240ms">
        <h2>3) 报告预览</h2>

        <div class="summary" id="summaryCards">
          <article>
            <p>Run ID</p>
            <strong id="summaryRunId">-</strong>
          </article>
          <article>
            <p>Case 数量</p>
            <strong id="summaryCaseCount">-</strong>
          </article>
          <article>
            <p>通过率</p>
            <strong id="summaryPassRate">-</strong>
          </article>
          <article>
            <p>模型</p>
            <strong id="summaryModel">-</strong>
          </article>
        </div>

        <pre id="reportViewer" class="report-viewer">暂无报告，先点击“开始运行”或从历史列表选择。</pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
